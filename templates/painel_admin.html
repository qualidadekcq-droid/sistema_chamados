<!DOCTYPE html>
<html>
<head>
    <title>Painel Admin</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        .sidebar {
            width: 200px;
            height: 100vh;
            background: #1f2937;
            position: fixed;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
            margin-bottom: 5px;
        }

        .content {
            margin-left: 220px;
            padding: 20px;
        }

        h1 {
            color: #111827;
        }

        form {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            max-width: 500px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
        }

        button {
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            width: 100%;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #2563eb;
            color: white;
        }

        .btn-del {
            background: red;
            color: white;
            padding: 6px 10px;
            text-decoration: none;
            border-radius: 5px;
        }

        .role-badge {
            padding: 3px 6px;
            border-radius: 5px;
            background: #e5e7eb;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/chamados">📌 Chamados</a>
    <a href="/admin">🧑‍💼 Admin</a>
    <a href="/logout">🚪 Sair</a>
</div>

<div class="content">

    <h1>Painel Admin</h1>

    <!-- FORM CRIAR USUÁRIO -->
    <form method="POST" action="/criar_usuario">

        <input name="username" placeholder="Usuário" required>
        <input name="senha" type="password" placeholder="Senha" required>

        <select name="role" required>
            <option value="usuario">Usuário</option>
            <option value="admin">Admin</option>
            <option value="master">Master</option>
        </select>

        <input name="setor" placeholder="Setor" required>

        <button type="submit">Criar Usuário</button>
    </form>

    <!-- LISTA USUÁRIOS -->
    <h2>Usuários cadastrados</h2>

    <table>
        <tr>
            <th>Usuário</th>
            <th>Role</th>
            <th>Setor</th>
            <th>Ação</th>
        </tr>

        {% for u in usuarios %}
        <tr>
            <td>{{ u.usuario }}</td>
            <td><span class="role-badge">{{ u.role }}</span></td>
            <td>{{ u.setor }}</td>
            <td>
                <a class="btn-del" href="/excluir_usuario/{{ u.usuario }}">Excluir</a>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
