<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="sidebar">
    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/abrir">➕ Abrir Chamado</a>
    <a href="/chamados">📌 Chamados</a>
    <a href="/admin">🧑‍💼 Admin</a>
    <a href="/logout">🚪 Sair</a>
</div>

<div class="content">

<h1>Admin</h1>

<form method="POST" action="/criar_usuario">

<input name="username" placeholder="Usuário" required>
<input name="senha" type="password" placeholder="Senha" required>

<select name="role">
<option>usuario</option>
<option>admin</option>
<option>master</option>
</select>

<select name="setor">
{% for d in departamentos %}
<option value="{{ d }}">{{ d }}</option>
{% endfor %}
</select>

<button>Criar usuário</button>

</form>

<h2>Usuários</h2>

{% for u in usuarios %}

<p>
<b>{{ u.usuario }}</b> | {{ u.role }} | {{ u.setor }}

<a href="/reset_senha/{{ u.usuario }}">Reset senha</a>
<a href="/excluir_usuario/{{ u.usuario }}">Excluir</a>

</p>

{% endfor %}

</div>

</body>
</html>
