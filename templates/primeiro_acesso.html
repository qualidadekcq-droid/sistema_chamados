<!DOCTYPE html>
<html>
<head>
    <title>Primeiro Acesso</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; background:#f3f4f6;">

    <div style="background:white; padding:30px; border-radius:10px; width:100%; max-width:400px; text-align:center;">
        <h2>🔐 Criar Usuário MASTER</h2>

        <form method="POST">
            <input name="usuario" placeholder="Usuário master" required
                   style="width:100%; padding:10px; margin:10px 0;">

            <input type="password" name="senha" placeholder="Senha" required
                   style="width:100%; padding:10px; margin:10px 0;">

            <button style="width:100%; padding:10px; background:#2563eb; color:white; border:none;">
                Criar Master
            </button>
        </form>
    </div>

</body>
</html>
