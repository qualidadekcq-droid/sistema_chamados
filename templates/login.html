<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#2563eb">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js');
}
</script>

<style>
body{
    font-family:Arial;
    background:#111827;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    background:white;
    padding:30px;
    border-radius:10px;
    width:90%;
    max-width:300px;
    text-align:center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid #ccc;
    outline:none;
}

input:focus{
    border-color:#2563eb;
}

button{
    width:100%;
    padding:10px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#1d4ed8;
}

.erro{
    color:red;
    font-weight:bold;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="box">

    <h2>Login</h2>

    {% if erro %}
    <p class="erro">{{ erro }}</p>
    {% endif %}

    <form method="POST" action="/login" autocomplete="off">

        <input 
            name="username" 
            placeholder="Usuário" 
            required
            autocomplete="username"
        >

        <input 
            name="senha" 
            type="password" 
            placeholder="Senha" 
            required
            autocomplete="current-password"
        >

        <button type="submit">Entrar</button>

    </form>

</div>

</body>
</html>
