<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            background: #1f2937;
            position: fixed;
            padding: 20px;
            color: white;
        }

        .sidebar h2 {
            color: white;
            margin-bottom: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background: #374151;
        }

        .content {
            margin-left: 240px;
            padding: 20px;
        }

        h1 {
            color: #111827;
        }

        .cards {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 20px;
            width: 200px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin: 0;
            font-size: 16px;
            color: #374151;
        }

        .card p {
            font-size: 22px;
            font-weight: bold;
            margin-top: 10px;
            color: #111827;
        }

        .userbox {
            margin-top: 20px;
            padding: 10px;
            background: #111827;
            border-radius: 8px;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>Sistema</h2>

    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/chamados">📌 Chamados</a>

    {% if role == "master" %}
        <a href="/admin">🧑‍💼 Admin</a>
    {% endif %}

    <a href="/logout">🚪 Sair</a>

    <div class="userbox">
        <div><b>Usuário:</b> {{user}}</div>
        <div><b>Setor:</b> {{setor}}</div>
        <div><b>Perfil:</b> {{role}}</div>
    </div>
</div>

<div class="content">

    <h1>Bem-vindo 👋</h1>
    <p>Visão geral do sistema de chamados</p>

    <div class="cards">
        <div class="card">
            <h3>Total</h3>
            <p>{{total}}</p>
        </div>

        <div class="card">
            <h3>Abertos</h3>
            <p>{{abertos}}</p>
        </div>

        <div class="card">
            <h3>Andamento</h3>
            <p>{{andamento}}</p>
        </div>

        <div class="card">
            <h3>Finalizados</h3>
            <p>{{finalizados}}</p>
        </div>
    </div>

</div>

</body>
</html>
