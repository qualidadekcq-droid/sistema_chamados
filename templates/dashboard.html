<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        .sidebar {
            width: 200px;
            height: 100vh;
            background: #1f2937;
            position: fixed;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
        }

        .content {
            margin-left: 220px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 10px;
            display: inline-block;
            width: 200px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h3 style="color:white;">Sistema</h3>
    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/chamados">📌 Chamados</a>
    <a href="/logout">🚪 Sair</a>
</div>

<div class="content">

    <h1>Bem-vindo, {{user}}</h1>
    <p>Setor: {{setor}} | Perfil: {{role}}</p>

    <div class="card">Total: {{total}}</div>
    <div class="card">Abertos: {{abertos}}</div>
    <div class="card">Andamento: {{andamento}}</div>
    <div class="card">Finalizados: {{finalizados}}</div>

</div>

</body>
</html>
