<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#2563eb">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js');
}
</script>
</head>

<body>

<div class="sidebar">
    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/abrir">➕ Abrir Chamado</a>
    <a href="/chamados">📌 Chamados</a>

    {% if role in ["admin","master"] %}
    <a href="/admin">🧑‍💼 Admin</a>
    {% endif %}

    <a href="/logout">🚪 Sair</a>
</div>

<div class="content">

<h1>Bem-vindo, {{ user }}</h1>
<p>Setor: {{ setor }} | Perfil: {{ role }}</p>

<div class="cards">
    <div class="card">Total: {{ total }}</div>
    <div class="card">Abertos: {{ abertos }}</div>
    <div class="card">Andamento: {{ andamento }}</div>
    <div class="card">Finalizados: {{ finalizados }}</div>
</div>

</div>

</body>
</html>
