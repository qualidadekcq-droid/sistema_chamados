<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        /* SIDEBAR */
        .sidebar {
            width: 200px;
            height: 100vh;
            background: #1f2937;
            position: fixed;
            padding: 20px;
        }

        .sidebar h3 {
            color: white;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
            margin-bottom: 5px;
        }

        /* CONTEÚDO */
        .content {
            margin-left: 220px;
            padding: 20px;
        }

        h1 {
            color: #111827;
        }

        /* CARDS */
        .cards {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 20px;
            width: 200px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        /* MOBILE */
        @media (max-width: 768px) {

            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                display: flex;
                justify-content: space-around;
                align-items: center;
            }

            .sidebar h3 {
                display: none;
            }

            .sidebar a {
                padding: 10px;
                font-size: 14px;
            }

            .content {
                margin-left: 0;
                margin-top: 10px;
            }

            .cards {
                flex-direction: column;
            }

            .card {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<!-- MENU -->
<div class="sidebar">

    <h3>Sistema</h3>

    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/chamados">📌 Chamados</a>

    {% if role == "master" or role == "admin" %}
    <a href="/admin">🧑‍💼 Admin</a>
    {% endif %}

    <a href="/logout">🚪 Sair</a>
</div>

<!-- CONTEÚDO -->
<div class="content">

    <h1>Bem-vindo, {{ user }}</h1>
    <p>Setor: {{ setor }} | Perfil: {{ role }}</p>

    <div class="cards">
        <div class="card">Total: {{ total }}</div>
        <div class="card">Abertos: {{ abertos }}</div>
        <div class="card">Andamento: {{ andamento }}</div>
        <div class="card">Finalizados: {{ finalizados }}</div>
    </div>

</div>

</body>
</html>
