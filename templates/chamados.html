<!DOCTYPE html>
<html>
<head>
    <title>Chamados</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        .sidebar {
            width: 200px;
            height: 100vh;
            background: #1f2937;
            position: fixed;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
            margin-bottom: 5px;
        }

        .content {
            margin-left: 220px;
            padding: 20px;
        }

        h1 {
            color: #111827;
        }

        form {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
        }

        button {
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            width: 100%;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #2563eb;
            color: white;
        }

        a {
            margin-right: 8px;
            text-decoration: none;
            color: #2563eb;
        }
    </style>

</head>

<body>

<div class="sidebar">
    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/chamados">📌 Chamados</a>
    <a href="/logout">🚪 Sair</a>
</div>

<div class="content">

<h1>Chamados</h1>

<!-- FORMULÁRIO COMPLETO -->
<form method="POST" action="/abrir_chamado" enctype="multipart/form-data">

    <input name="titulo" placeholder="Título" required>
    <input name="descricao" placeholder="Descrição" required>

    <!-- SETORES COMPLETOS -->
    <select name="setor" required>
        <option value="TI">TI</option>
        <option value="RH">RH</option>
        <option value="Marketing">Marketing</option>
        <option value="Financeiro">Financeiro</option>
        <option value="Fiscal">Fiscal</option>
        <option value="Qualidade">Qualidade</option>
        <option value="DP">Departamento Pessoal</option>
        <option value="Compras">Compras</option>
        <option value="Gerência Comercial">Gerência Comercial</option>
    </select>

    <select name="urgencia" required>
        <option value="Baixa">Baixa</option>
        <option value="Média">Média</option>
        <option value="Alta">Alta</option>
    </select>

    <!-- 📎 UPLOAD -->
    <label style="display:block; margin-top:10px;">
        📎 Anexar evidência (imagem ou print)
    </label>

    <input type="file" name="evidencia" style="margin-bottom:10px;">

    <button type="submit">Abrir Chamado</button>

</form>

<!-- TABELA -->
<table>

<tr>
    <th>Título</th>
    <th>Setor</th>
    <th>Urgência</th>
    <th>Status</th>
    <th>Anexo</th>
    <th>Ações</th>
</tr>

{% for c in chamados %}
<tr>
    <td>{{c.titulo}}</td>
    <td>{{c.setor}}</td>
    <td>{{c.urgencia}}</td>
    <td>{{c.status}}</td>

    <!-- DOWNLOAD ANEXO -->
    <td>
        {% if c.evidencia %}
            <a href="/download/{{c.evidencia}}">📎 Baixar</a>
        {% else %}
            Sem anexo
        {% endif %}
    </td>

    <td>
        <a href="/atender/{{c.id}}">🟡 Atender</a>
        <a href="/finalizar/{{c.id}}">🟢 Finalizar</a>
    </td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
