<!DOCTYPE html>
<html>
<head>
    <title>Chamados</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        .sidebar {
            width: 200px;
            height: 100vh;
            background: #1f2937;
            position: fixed;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
        }

        .content {
            margin-left: 220px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        .chat-box {
            border-top: 1px solid #ddd;
            margin-top: 10px;
            padding-top: 10px;
        }

        .msg {
            background: #eef2ff;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
        }

        .me {
            background: #d1fae5;
        }

        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            width: 100%;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/chamados">📌 Chamados</a>
    <a href="/logout">🚪 Sair</a>
</div>

<div class="content">

    <h1>Chamados</h1>

    {% for c in chamados %}

    <div class="card">

        <h3>{{c.titulo}}</h3>
        <p>{{c.descricao}}</p>
        <p>Status: {{c.status}}</p>

        {% if c.anexo %}
        <p><a href="/download/{{c.anexo}}">📎 Ver anexo</a></p>
        {% endif %}

        <div class="chat-box">

            <h4>Chat</h4>

            {% for r in c.respostas %}
                <div class="msg">
                    <b>{{r.autor}}</b><br>
                    {{r.texto}}

                    {% if r.anexo %}
                        <br><a href="/download/{{r.anexo}}">📎 Anexo</a>
                    {% endif %}
                </div>
            {% endfor %}

            <form method="POST" action="/responder/{{c.id}}" enctype="multipart/form-data">

                <textarea name="texto" placeholder="Escreva uma resposta..." required></textarea>

                <input type="file" name="anexo">

                <button>Responder</button>

            </form>

        </div>
    </div>

    {% endfor %}

</div>

</body>
</html>
