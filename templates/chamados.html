<!DOCTYPE html>
<html>
<head>
    <title>Chamados</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        .sidebar {
            width: 200px;
            height: 100vh;
            background: #1f2937;
            position: fixed;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
        }

        .content {
            margin-left: 220px;
            padding: 20px;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #2563eb;
            color: white;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/chamados">📌 Chamados</a>
    <a href="/logout">🚪 Sair</a>
</div>

<div class="content">

<h1>Chamados</h1>

<!-- FORM -->
<form method="POST" action="/abrir_chamado" enctype="multipart/form-data">

    <input name="titulo" placeholder="Título" required>
    <input name="descricao" placeholder="Descrição" required>

    <select name="setor">
        <option>TI</option>
        <option>RH</option>
        <option>Marketing</option>
        <option>Financeiro</option>
        <option>Fiscal</option>
        <option>Qualidade</option>
        <option>DP</option>
        <option>Compras</option>
        <option>Gerência Comercial</option>
    </select>

    <select name="urgencia">
        <option>Baixa</option>
        <option>Média</option>
        <option>Alta</option>
    </select>

    <input type="file" name="evidencia">

    <button type="submit">Abrir Chamado</button>
</form>

<!-- TABLE -->
<table>

<tr>
    <th>Título</th>
    <th>Setor</th>
    <th>Urgência</th>
    <th>Status</th>
    <th>Ações</th>
</tr>

{% for c in chamados %}
<tr>
    <td>{{c.titulo}}</td>
    <td>{{c.setor}}</td>
    <td>{{c.urgencia}}</td>
    <td>{{c.status}}</td>
    <td>
        {% if c.evidencia %}
            <a href="/download/{{c.evidencia}}">📎 Baixar</a>
        {% endif %}
        <a href="/atender/{{c.id}}">🟡</a>
        <a href="/finalizar/{{c.id}}">🟢</a>
    </td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
