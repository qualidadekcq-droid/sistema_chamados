<!DOCTYPE html>
<html>
<head>
    <title>Chamados</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="sidebar">
    <h2>Sistema</h2>
<table>
<tr>
    <th>Título</th>
    <th>Setor</th>
    <th>Urgência</th>
    <th>Status</th>
    <th>Ações</th>
</tr>

{% for c in chamados %}
<tr>
    <td>{{c.titulo}}</td>
    <td>{{c.setor}}</td>
    <td>{{c.urgencia}}</td>
    <td>{{c.status}}</td>

    <td>
        <a href="/atender/{{c.id}}">🟡 Atender</a>
        <a href="/finalizar/{{c.id}}">🟢 Finalizar</a>
    </td>
</tr>
{% endfor %}

</table>
