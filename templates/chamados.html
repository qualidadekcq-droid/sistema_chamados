<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        .sidebar {
            width: 200px;
            height: 100vh;
            background: #1f2937;
            position: fixed;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
            margin-bottom: 5px;
        }

        .content {
            margin-left: 220px;
            padding: 20px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .big {
            font-size: 26px;
            font-weight: bold;
        }

        .notif {
            background: #111827;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .notif-item {
            background: white;
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/chamados">📌 Chamados</a>
    <a href="/logout">🚪 Sair</a>
</div>

<div class="content">

    <h1>Bem-vindo {{user}}</h1>
    <p>Setor: {{setor}} | Tipo: {{role}}</p>

    <!-- NOTIFICAÇÕES -->
    <div class="notif">
        🔔 Notificações ({{notificacoes|length}})
    </div>

    {% for n in notificacoes %}
        <div class="notif-item">
            {{n}}
        </div>
    {% endfor %}

    <!-- CARDS -->
    <div class="cards">

        <div class="card">
            <p>Total</p>
            <p class="big">{{total}}</p>
        </div>

        <div class="card">
            <p>Abertos</p>
            <p class="big">{{abertos}}</p>
        </div>

        <div class="card">
            <p>Em andamento</p>
            <p class="big">{{andamento}}</p>
        </div>

        <div class="card">
            <p>Finalizados</p>
            <p class="big">{{finalizados}}</p>
        </div>

    </div>

</div>

</body>
</html>
