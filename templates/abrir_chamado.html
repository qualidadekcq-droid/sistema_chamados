<!DOCTYPE html>
<html>
<head>
<title>Abrir Chamado</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
.form-container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input, textarea, select {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    box-sizing: border-box;
}

textarea {
    min-height: 120px;
}

.upload-label {
    display:block;
    padding:12px;
    background:#f3f4f6;
    border:1px dashed #aaa;
    text-align:center;
    margin-top:10px;
    border-radius:8px;
}

.upload-input {
    display:none;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#2563eb;
    color:white;
    border:none;
}
</style>
</head>

<body>

<div class="sidebar">
    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/abrir">➕ Abrir Chamado</a>
    <a href="/chamados">📌 Chamados</a>

    {% if role in ["admin","master"] %}
    <a href="/admin">🧑‍💼 Admin</a>
    {% endif %}

    <a href="/logout">🚪 Sair</a>
</div>

<div class="content">

<div class="form-container">

<h2>Abrir Chamado</h2>

<form method="POST" action="/abrir_chamado" enctype="multipart/form-data">

<input name="titulo" placeholder="Título" required>

<textarea name="descricao" placeholder="Descrição" required></textarea>

<select name="setor" required>
<option value="">Selecione setor</option>
{% for d in departamentos %}
<option value="{{ d }}">{{ d }}</option>
{% endfor %}
</select>

<label class="upload-label">
📎 Anexar arquivo ou tirar foto
<input class="upload-input" type="file" name="anexo" accept="image/*,application/pdf" capture="environment">
</label>

<button type="submit">Abrir Chamado</button>

</form>

</div>

</div>

</body>
</html>
