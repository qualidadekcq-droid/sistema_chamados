<!DOCTYPE html>
<html>
<head>
<title>Abrir Chamado</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
.container{
    max-width:700px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

input, select, textarea{
    width:100%;
    padding:10px;
    margin-top:8px;
    box-sizing:border-box;
    border:1px solid #ddd;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    margin-top:18px;
    cursor:pointer;
    border-radius:6px;
    font-weight:bold;
}

label{
    margin-top:14px;
    display:block;
    font-weight:600;
}

.success{
    color:#15803d;
    background:#dcfce7;
    padding:10px;
    border-radius:6px;
    margin-bottom:15px;
}

.info{
    font-size:12px;
    color:#666;
    margin-top:6px;
}

@media(max-width:768px){
    .container{
        padding:15px;
    }
}
</style>
</head>

<body>

<div class="sidebar">
    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/abrir">➕ Abrir Chamado</a>
    <a href="/chamados">📌 Chamados</a>

    {% if role in ['admin','master'] %}
    <a href="/admin">🧑‍💼 Painel Admin</a>
    {% endif %}

    <a href="/logout">🚪 Sair</a>
</div>

<div class="container">

<div class="card">

<h2>Abrir Chamado</h2>

{% if request.args.get('ok') %}
<p class="success">
✔ Chamado aberto com sucesso.
</p>
{% endif %}

<form method="POST" action="/abrir">

<label>Título</label>
<input name="titulo" required>

<label>Descrição</label>
<textarea name="descricao" rows="6" required></textarea>

<label>Setor Responsável</label>
<select name="setor" required>
    <option value="">Selecione</option>

    {% for d in departamentos %}
    <option value="{{ d.nome }}">{{ d.nome|upper }}</option>
    {% endfor %}
</select>

<label>Prioridade</label>
<select name="prioridade" required>
    <option value="Normal">Normal</option>
    <option value="Alta">Alta</option>
</select>

<p class="info">
Após abrir o chamado, o setor selecionado receberá notificação por e-mail.
</p>

<button type="submit">Abrir Chamado</button>

</form>

</div>
</div>

</body>
</html>
