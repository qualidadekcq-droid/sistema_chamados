<!DOCTYPE html>
<html>
<head>
<title>Abrir Chamado</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
.container{
    max-width:600px;
    margin:auto;
    padding:20px;
}

input, select, textarea{
    width:100%;
    padding:10px;
    margin-top:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    margin-top:15px;
    cursor:pointer;
}

label{
    margin-top:10px;
    display:block;
}
</style>
</head>

<body>

<div class="sidebar">
    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/abrir">➕ Abrir Chamado</a>
    <a href="/chamados">📌 Chamados</a>
    <a href="/logout">🚪 Sair</a>
</div>

<div class="container">

<h2>Abrir Chamado</h2>

<form method="POST" action="/abrir_chamado" enctype="multipart/form-data">

<label>Título</label>
<input name="titulo" required>

<label>Descrição</label>
<textarea name="descricao" rows="5" required></textarea>

<label>Setor</label>
<select name="setor" required>
    {% for d in departamentos %}
    <option value="{{ d.nome }}">{{ d.nome }}</option>
    {% endfor %}
</select>

<label>Prioridade</label>
<select name="prioridade" required>
    <option value="Normal">Normal</option>
    <option value="Alta">Alta</option>
</select>

<label>Anexo</label>
<input type="file" name="anexo">

<button type="submit">Abrir Chamado</button>

</form>

</div>

</body>
</html>
