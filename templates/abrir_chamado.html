<!DOCTYPE html>
<html>
<head>
<title>Abrir Chamado</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#2563eb">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js');
}
</script>
</head>

<body>

<div class="sidebar">
    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/abrir">➕ Abrir Chamado</a>
    <a href="/chamados">📌 Chamados</a>
    <a href="/logout">🚪 Sair</a>
</div>

<div class="content">

<h2>Abrir Chamado</h2>

<form method="POST" action="/abrir_chamado" enctype="multipart/form-data">

<input name="titulo" placeholder="Título" required>

<textarea name="descricao" placeholder="Descrição" required></textarea>

<select name="setor" required>
{% for d in departamentos %}
<option>{{ d }}</option>
{% endfor %}
</select>

<!-- 📎 UM SÓ INPUT (resolve duplicação + câmera mobile) -->
<input type="file" name="anexo" accept="image/*,.pdf,.doc,.docx" capture="environment">

<button>Abrir Chamado</button>

</form>

</div>

</body>
</html>
